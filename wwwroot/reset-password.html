<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | VM Automation Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.45);
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 26px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-top: 8px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #cbd5e1;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #020617;
            color: white;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: #3b82f6; }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #1d4ed8; }

        .message {
            display: none;
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            word-break: break-word;
        }

        .error {
            background: #7f1d1d;
            color: #fecaca;
        }

        .success {
            background: #14532d;
            color: #bbf7d0;
        }

        .recovery-box {
            display: none;
            margin-top: 18px;
            padding: 15px;
            background: #0f172a;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            text-align: center;
        }

        .recovery-code {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 10px;
            color: #7dd3fc;
        }

        .link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .link a {
            color: #60a5fa;
            text-decoration: none;
        }

        .link a:hover { text-decoration: underline; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Reset Password</h1>
            <div class="subtitle">Use your recovery code to set a new password</div>

            <form id="resetForm">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>

                <label for="recoveryCodeInput">Recovery code</label>
                <input type="text" id="recoveryCodeInput" placeholder="Enter recovery code" required>

                <label for="newPassword">New password</label>
                <input type="password" id="newPassword" placeholder="Minimum 8 characters" required>

                <label for="confirmPassword">Confirm new password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>

                <button type="submit" id="resetButton">Reset Password</button>

                <div id="message" class="message"></div>

                <div id="recoveryBox" class="recovery-box">
                    <div>Password reset successful. Save your new recovery code.</div>
                    <div id="newRecoveryCode" class="recovery-code"></div>
                </div>
            </form>

            <div class="link">
                <a href="/login.html">Back to login</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("resetForm");
        const button = document.getElementById("resetButton");
        const message = document.getElementById("message");
        const recoveryBox = document.getElementById("recoveryBox");
        const newRecoveryCode = document.getElementById("newRecoveryCode");

        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            message.style.display = "none";
            recoveryBox.style.display = "none";
            message.className = "message";

            const username = document.getElementById("username").value.trim();
            const recoveryCode = document.getElementById("recoveryCodeInput").value.trim();
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            button.disabled = true;
            button.textContent = "Resetting password...";

            try {
                const response = await fetch("/api/reset-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        recoveryCode: recoveryCode,
                        newPassword: newPassword
                    })
                });

                const data = await response.json().catch(() => ({}));

                if (response.ok) {
                    showMessage("Password reset successfully.", "success");
                    newRecoveryCode.textContent = data.newRecoveryCode;
                    recoveryBox.style.display = "block";
                    button.style.display = "none";
                } else {
                    showMessage(data.error || "Password reset failed.", "error");
                }
            } catch {
                showMessage("Reset service unavailable.", "error");
            }

            button.disabled = false;
            button.textContent = "Reset Password";
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.classList.add(type);
            message.style.display = "block";
        }
    </script>
</body>
</html>
